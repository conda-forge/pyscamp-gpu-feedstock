{% set name = "pyscamp" %}
{% set version = "4.0.2dev0" %}

package:
  name: {{ name|lower }}-gpu
  version: {{ version }}

source:
  # Testing SCAMP PR #136 (fix/python-3.13-numpy-2-compat)
  # Switch back to a PyPI url + sha256 once v4.0.2 is released.
  git_url: https://github.com/zpzim/SCAMP
  git_rev: 3d391097e5bfc9c362e31db0cecf7070a3965c00

build:
  number: 0
  skip: true  # [cuda_compiler_version == "None"]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}
    - cmake
    - make  # [not win]
    - ninja  # [win]

  host:
    - cuda-version {{ cuda_compiler_version }}
    - python
    - setuptools >=70
    - setuptools-scm
    - pybind11 >=2.13.6
    - eigen 3.4.0
    - cuda-cudart-dev   # [(cuda_compiler_version or "").startswith("12")]
    - libcufft-dev      # [(cuda_compiler_version or "").startswith("12")]

  run:
    - python

test:
  source_files:
    - test
  imports:
    - pyscamp
  commands:
    - pip check
    - cd test
    - python test_pyscamp.py
  requires:
    - pip
    - numpy

about:
  home: https://github.com/zpzim/SCAMP
  summary: SCAlable Matrix Profile
  license: MIT
  license_file:
    - LICENSE
    - third_party/cpu_features/LICENSE

extra:
  recipe-maintainers:
    - zpzim
